<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Fond bleu -->
  <rect width="120" height="120" rx="16" fill="#005BA6"/>
  <!-- Losange orange -->
  <rect x="20" y="20" width="80" height="80" rx="8" fill="#F37021" transform="rotate(45, 60, 60)"/>
  <!-- Texte MOOV en blanc -->
  <text x="60" y="52" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="22" fill="#FFFFFF" letter-spacing="1">MOOV</text>
  <!-- Texte Money en blanc avec italique -->
  <text x="60" y="78" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="22" fill="#FFFFFF" font-style="italic">Money</text>
  <!-- Petit trait décoratif sous Money -->
  <line x1="42" y1="83" x2="78" y2="83" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
</svg>
