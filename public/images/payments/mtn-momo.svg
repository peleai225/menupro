<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 120" width="240" height="120">
  <!-- Fond jaune MTN -->
  <rect width="240" height="120" rx="16" fill="#FFC800"/>
  <!-- Icône téléphone/CFA stylisée -->
  <g transform="translate(20, 15)">
    <!-- Billets CFA derrière le téléphone -->
    <rect x="18" y="5" width="35" height="50" rx="4" fill="#4A90D9" transform="rotate(-15, 35, 30)"/>
    <rect x="22" y="8" width="35" height="50" rx="4" fill="#2D2D2D" transform="rotate(-8, 40, 33)"/>
    <rect x="26" y="10" width="35" height="50" rx="4" fill="#D32F2F" transform="rotate(0, 43, 35)"/>
    <!-- Cercle CFA -->
    <circle cx="30" cy="18" r="12" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2"/>
    <text x="30" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="10" fill="#4A90D9">CFA</text>
    <!-- Téléphone -->
    <rect x="35" y="20" width="28" height="55" rx="5" fill="#2D2D2D"/>
    <rect x="38" y="25" width="22" height="40" rx="2" fill="#4FC3F7"/>
    <circle cx="49" cy="70" r="3" fill="#555"/>
  </g>
  <!-- Texte MTN -->
  <text x="115" y="52" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="36" fill="#00587C">MTN</text>
  <!-- Texte MoMo -->
  <text x="115" y="95" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="40" fill="#00587C">MoMo</text>
</svg>
