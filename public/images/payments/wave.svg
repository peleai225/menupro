<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <!-- Fond bleu cyan arrondi (icône Wave) -->
  <rect x="0" y="10" width="100" height="100" rx="22" fill="#29B6F6"/>
  <!-- Pingouin Wave - corps -->
  <ellipse cx="50" cy="72" rx="22" ry="30" fill="#1A1A1A"/>
  <!-- Pingouin - ventre blanc -->
  <ellipse cx="50" cy="76" rx="14" ry="22" fill="#FFFFFF"/>
  <!-- Pingouin - tête -->
  <circle cx="50" cy="42" r="14" fill="#1A1A1A"/>
  <!-- Pingouin - yeux -->
  <circle cx="45" cy="40" r="2.5" fill="#FFFFFF"/>
  <circle cx="55" cy="40" r="2.5" fill="#FFFFFF"/>
  <circle cx="45.8" cy="40" r="1.2" fill="#1A1A1A"/>
  <circle cx="55.8" cy="40" r="1.2" fill="#1A1A1A"/>
  <!-- Pingouin - bec -->
  <ellipse cx="50" cy="46" rx="3" ry="1.8" fill="#FF9800"/>
  <!-- Pingouin - main/aile droite qui salue -->
  <path d="M72 52 Q78 42 74 35" fill="none" stroke="#1A1A1A" stroke-width="5" stroke-linecap="round"/>
  <!-- Pingouin - pieds -->
  <ellipse cx="42" cy="100" rx="7" ry="3" fill="#FF9800"/>
  <ellipse cx="58" cy="100" rx="7" ry="3" fill="#FF9800"/>
  <!-- Texte "wave" -->
  <text x="115" y="72" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="38" fill="#1A1A1A">wave</text>
</svg>
